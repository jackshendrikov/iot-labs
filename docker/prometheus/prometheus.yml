# Prometheus конфіг для UrbanPulse IoT.
# Єдина ціль — Store API, який експортує доменні та мережеві лічильники через /metrics.
global:
  scrape_interval: 10s
  evaluation_interval: 30s

scrape_configs:
  - job_name: "urbanpulse-store"
    metrics_path: /metrics
    static_configs:
      - targets: ["store:8000"]
        labels:
          service: "store"
          component: "api"

  # Self-monitoring: щоб Grafana бачила, що сам Prometheus живий.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
