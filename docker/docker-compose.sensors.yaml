name: "sensors"

services:
  postgres_db:
    image: postgres:18-alpine
    container_name: postgres_db_sensors
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sensors
    volumes:
      - postgres_sensors_data:/var/lib/postgresql/data
      - ./db/structure.sql:/docker-entrypoint-initdb.d/structure.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sensors"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lab6_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_sensors
    restart: unless-stopped
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    volumes:
      - pgadmin_sensors_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - lab6_network

  store:
    container_name: store_sensors
    build:
      context: ..
      dockerfile: docker/Dockerfile.store
    restart: unless-stopped
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sensors
      STORE_HOST: "0.0.0.0"
      STORE_PORT: 8000
      LOG_LEVEL: "INFO"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - lab6_network

  sensors_generate:
    container_name: sensors_generate
    build:
      context: ..
      dockerfile: docker/Dockerfile.store
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sensors
      LOG_LEVEL: "INFO"
    command: ["python", "-m", "src.synthetic.main", "--output-dir", "data"]
    volumes:
      - ../data:/app/data
    networks:
      - lab6_network
    restart: "no"

  sensors:
    container_name: sensors
    build:
      context: ..
      dockerfile: docker/Dockerfile.store
    depends_on:
      postgres_db:
        condition: service_healthy
      store:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: 5432
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: sensors
      LOG_LEVEL: "INFO"
    command: ["python", "-m", "src.synthetic.main", "--seed-db", "--output-dir", "data"]
    volumes:
      - ../data:/app/data
    networks:
      - lab6_network
    restart: "no"

networks:
  lab6_network:

volumes:
  postgres_sensors_data:
  pgadmin_sensors_data:
